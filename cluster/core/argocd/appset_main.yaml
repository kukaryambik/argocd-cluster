---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: main
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/kukaryambik/argocd-cluster.git
        revision: HEAD
        directories:
          - path: cluster/main/*
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-options: '{{ default "" .syncOptions }}'
        argocd.argoproj.io/sync-wave: "{{ default 30 .syncWave }}"
      name: "main--{{.path.basenameNormalized}}"
      namespace: argocd
    spec:
      destination:
        namespace: "{{.path.basenameNormalized}}"
        server: "https://kubernetes.default.svc"
      project: init
      source:
        path: "{{.path.path}}"
        repoURL: https://github.com/kukaryambik/argocd-cluster.git
        targetRevision: HEAD
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
