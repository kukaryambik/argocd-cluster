---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: meta-infra
  namespace: argocd
spec:
  project: meta
  source:
    repoURL: https://github.com/kukaryambik/argocd-cluster.git
    targetRevision: HEAD
    path: cluster/infra
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    syncOptions:
      - "CreateNamespace=true"
