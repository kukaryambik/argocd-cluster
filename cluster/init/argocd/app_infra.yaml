---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra
  namespace: argocd
spec:
  project: meta
  source:
    repoURL: https://github.com/kukaryambik/argocd-cluster.git
    targetRevision: HEAD
    path: cluster/infra
  syncPolicy:
    automated: {}
    syncOptions:
      - "CreateNamespace=true"

